<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing Bot</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0; }
        canvas { background: white; border: 2px solid #333; touch-action: none; cursor: crosshair; }
        .controls { margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="canvas" width="300" height="300"></canvas>
    
    <div class="controls">
        <button onclick="clearCanvas()">Hapus</button>
        <button onclick="sendDrawing()">Kirim Gambar</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        // Inisialisasi posisi awal
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        canvas.onpointerdown = (e) => { painting = true; draw(e); };
        canvas.onpointerup = () => { painting = false; ctx.beginPath(); };
        canvas.onpointermove = draw;

        function draw(e) {
            if (!painting) return;
            // Mendapatkan posisi koordinat sesuai layar HP
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function sendDrawing() {
            // Mengubah canvas menjadi data URL (Base64)
            const data = canvas.toDataURL('image/png');
            // Mengirim data ke bot Telegram
            window.Telegram.WebApp.sendData(data);
        }
    </script>
</body>
</html>
